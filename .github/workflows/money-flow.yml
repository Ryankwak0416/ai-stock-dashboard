name: update-money-flow

on:
  schedule:
    - cron: '40 9 * * 1-5'   # 평일 18:40 KST (기존 18:10 워크플로우와 시간 분리)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pykrx pandas
      - name: Collect data
        run: python money/collect_money.py
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add money/data.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "money-flow data $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push
