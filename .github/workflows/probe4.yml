name: probe4
on: { workflow_dispatch: }
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - name: Probe stock daily price API
        run: |
          python3 - <<'PY'
          import requests, json
          H={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126'}
          for name,u in [
            ('stock-price','https://m.stock.naver.com/api/stock/005930/price?pageSize=4&page=1'),
            ('stock-trend','https://m.stock.naver.com/api/stock/005930/trend?pageSize=4&page=1'),
          ]:
              try:
                  r=requests.get(u,headers=H,timeout=12)
                  print(f"=== {name} [{r.status_code}]")
                  print(r.text[:1200].replace(chr(10),' '))
              except Exception as e:
                  print(f"=== {name} ERROR {e}")
              print()
          PY
